<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@700&amp;family=Noto+Sans+Arabic:wght@400;500&amp;display=swap');
      .title { font-family: "Noto Naskh Arabic", serif; font-size: 52px; font-weight: 700; fill: #f0ede8; }
      .cat   { font-family: "Noto Sans Arabic", sans-serif; font-size: 20px; font-weight: 500; fill: #e03c2a; }
      .brand { font-family: "Noto Sans Arabic", sans-serif; font-size: 18px; fill: #444; }
      .date  { font-family: monospace; font-size: 16px; fill: #444; }
    </style>
  </defs>
  
  <!-- خلفية -->
  <rect width="1200" height="630" fill="#0d0d0d"/>
  
  <!-- خطوط الشبكة الخفية -->
  <line x1="0" y1="0" x2="0" y2="630" stroke="#111" stroke-width="1"/><line x1="60" y1="0" x2="60" y2="630" stroke="#111" stroke-width="1"/><line x1="120" y1="0" x2="120" y2="630" stroke="#111" stroke-width="1"/><line x1="180" y1="0" x2="180" y2="630" stroke="#111" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="630" stroke="#111" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="630" stroke="#111" stroke-width="1"/><line x1="360" y1="0" x2="360" y2="630" stroke="#111" stroke-width="1"/><line x1="420" y1="0" x2="420" y2="630" stroke="#111" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="630" stroke="#111" stroke-width="1"/><line x1="540" y1="0" x2="540" y2="630" stroke="#111" stroke-width="1"/><line x1="600" y1="0" x2="600" y2="630" stroke="#111" stroke-width="1"/><line x1="660" y1="0" x2="660" y2="630" stroke="#111" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="630" stroke="#111" stroke-width="1"/><line x1="780" y1="0" x2="780" y2="630" stroke="#111" stroke-width="1"/><line x1="840" y1="0" x2="840" y2="630" stroke="#111" stroke-width="1"/><line x1="900" y1="0" x2="900" y2="630" stroke="#111" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="630" stroke="#111" stroke-width="1"/><line x1="1020" y1="0" x2="1020" y2="630" stroke="#111" stroke-width="1"/><line x1="1080" y1="0" x2="1080" y2="630" stroke="#111" stroke-width="1"/><line x1="1140" y1="0" x2="1140" y2="630" stroke="#111" stroke-width="1"/>
  
  <!-- شريط علوي -->
  <rect x="0" y="0" width="1200" height="5" fill="#e03c2a"/>
  
  <!-- شريط سفلي -->
  <rect x="0" y="625" width="1200" height="5" fill="#1a1a1a"/>
  
  <!-- تاق التصنيف -->
  <rect x="54" y="40" width="180" height="40" rx="6" fill="#1a0804" stroke="#e03c2a" stroke-width="1"/>
  <text x="144" y="65" class="cat" text-anchor="middle">منهجية</text>
  
  <!-- العنوان -->
  <text x="1140" y="280" class="title" text-anchor="end" direction="rtl">مسارات الهجوم في Active Directory:</text>
  <text x="1140" y="360" class="title" text-anchor="end" direction="rtl">منهجية البحث عن الثغرات وتسلسل</text>
  <text x="1140" y="440" class="title" text-anchor="end" direction="rtl">الصلاحيات</text>
  
  <!-- خط أحمر فاصل -->
  <rect x="54" y="500" width="80" height="4" fill="#e03c2a" rx="2"/>
  
  <!-- شعار وتاريخ -->
  <text x="60" y="600" class="brand">OffsecAR</text>
  <text x="1140" y="600" class="date" text-anchor="end">04 Apr 2026</text>
</svg>