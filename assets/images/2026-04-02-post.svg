<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Naskh+Arabic:wght@700&amp;family=Noto+Sans+Arabic:wght@400;500&amp;display=swap');
      .title { font-family: "Noto Naskh Arabic", serif; font-size: 50px; font-weight: 700; fill: #f5f5f5; }
      .cat   { font-family: "Noto Sans Arabic", sans-serif; font-size: 20px; fill: #888; }
      .tag   { font-family: monospace; font-size: 18px; fill: #e03c2a; letter-spacing: 2px; }
      .sev   { font-family: "Noto Sans Arabic", sans-serif; font-size: 20px; fill: #e03c2a; }
      .brand { font-family: "Noto Sans Arabic", sans-serif; font-size: 20px; fill: #555; }
    </style>
  </defs>
  
  <rect width="1080" height="1080" fill="#0d0d0d"/>
  <line x1="0" y1="0" x2="0" y2="1080" stroke="#111" stroke-width="1"/><line x1="60" y1="0" x2="60" y2="1080" stroke="#111" stroke-width="1"/><line x1="120" y1="0" x2="120" y2="1080" stroke="#111" stroke-width="1"/><line x1="180" y1="0" x2="180" y2="1080" stroke="#111" stroke-width="1"/><line x1="240" y1="0" x2="240" y2="1080" stroke="#111" stroke-width="1"/><line x1="300" y1="0" x2="300" y2="1080" stroke="#111" stroke-width="1"/><line x1="360" y1="0" x2="360" y2="1080" stroke="#111" stroke-width="1"/><line x1="420" y1="0" x2="420" y2="1080" stroke="#111" stroke-width="1"/><line x1="480" y1="0" x2="480" y2="1080" stroke="#111" stroke-width="1"/><line x1="540" y1="0" x2="540" y2="1080" stroke="#111" stroke-width="1"/><line x1="600" y1="0" x2="600" y2="1080" stroke="#111" stroke-width="1"/><line x1="660" y1="0" x2="660" y2="1080" stroke="#111" stroke-width="1"/><line x1="720" y1="0" x2="720" y2="1080" stroke="#111" stroke-width="1"/><line x1="780" y1="0" x2="780" y2="1080" stroke="#111" stroke-width="1"/><line x1="840" y1="0" x2="840" y2="1080" stroke="#111" stroke-width="1"/><line x1="900" y1="0" x2="900" y2="1080" stroke="#111" stroke-width="1"/><line x1="960" y1="0" x2="960" y2="1080" stroke="#111" stroke-width="1"/><line x1="1020" y1="0" x2="1020" y2="1080" stroke="#111" stroke-width="1"/>
  <rect x="0" y="0" width="1080" height="6" fill="#e03c2a"/>
  
  <!-- تاق OffsecAR -->
  <rect x="54" y="28" width="200" height="38" rx="6" fill="#1a0804" stroke="#e03c2a" stroke-width="1"/>
  <text x="154" y="52" class="tag" text-anchor="middle">OffsecAR</text>
  
  <!-- التصنيف -->
  <text x="1020" y="110" class="cat" text-anchor="end" direction="rtl">ثغرة حرجة</text>
  
  <!-- فاصل -->
  <rect x="54" y="160" width="972" height="1" fill="#2a2a2a"/>
  
  <!-- العنوان -->
  <text x="1010" y="260" class="title" text-anchor="end" direction="rtl">ثغرة خطيرة في إضافة WordPress</text>
  <text x="1010" y="340" class="title" text-anchor="end" direction="rtl">Backup Migration تتيح تنفيذ أوامر</text>
  <text x="1010" y="420" class="title" text-anchor="end" direction="rtl">عن بُعد على ملايين المواقع</text>
  
  <!-- خط أحمر -->
  <rect x="54" y="480" width="60" height="4" fill="#e03c2a" rx="2"/>
  
  <!-- درجة الخطورة -->
  <rect x="54" y="920" width="260" height="44" rx="8" fill="#1a1a1a" stroke="#e03c2a" stroke-width="1"/>
  <circle cx="80" cy="942" r="7" fill="#e03c2a"/>
  <text x="96" y="948" class="sev">خطورة حرجة</text>
  
  <!-- فاصل سفلي -->
  <rect x="54" y="984" width="972" height="1" fill="#2a2a2a"/>
  
  <!-- الشعار والتاريخ -->
  <text x="60" y="1012" class="brand">@OffsecARE</text>
  <text x="1020" y="1012" class="brand" text-anchor="end">malekalthubiany.github.io/OffsecAR</text>
