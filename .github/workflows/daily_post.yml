name: نشر يومي - OffsecAR

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  daily-post:
    runs-on: ubuntu-latest
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: إعداد Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: تثبيت خطوط عربية و Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y fonts-noto-core fonts-noto-extra fonts-noto-ui-core libfreetype6-dev chromium-browser

      - name: تثبيت المكتبات
        run: pip install --quiet anthropic feedparser Pillow requests

      - name: توليد خبر اليوم
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/daily_post.py

      - name: توليد مقالات Blog اليوم
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_blog.py

      - name: رفع التغييرات
        run: |
          git config user.name  "offsecAR-bot"
          git config user.email "bot@offsecAR.github.io"
          git add _posts/ _blogs/ assets/images/
          git diff --staged --quiet || git commit -m "📰 $(date +'%Y-%m-%d') · خبر + 3 مقالات"
          git push

      - name: إرسال المحتوى للتيليقرام
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_notify.py

  deploy:
    needs: daily-post
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: استنساخ المستودع
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: إعداد Ruby و Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: بناء Jekyll
        run: bundle exec jekyll build --baseurl "/OffsecAR"
        env:
          JEKYLL_ENV: production

      - name: إعداد GitHub Pages
        uses: actions/configure-pages@v5

      - name: رفع ملفات الموقع
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./_site"

      - name: نشر على GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
